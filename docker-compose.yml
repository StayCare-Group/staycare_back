services:
  mysql:
    image: mysql:8.0
    container_name: staycare_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: staycare
      MYSQL_USER: staycare_dev
      MYSQL_PASSWORD: 123456
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Initialize with existing schema
      - ./docs/migration/staycare_mysql.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      target: build          # Usar etapa de construcción que incluye devDependencies
    container_name: staycare_backend
    restart: always
    command: npm run dev     # Usar ts-node-dev para reinicio automático
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=staycare_dev
      - DB_PASSWORD=123456
      - DB_NAME=staycare
    ports:
      - "5001:5001"
    volumes:
      - .:/app               # Mapear código local para sincronización
      - /app/node_modules     # Preservar node_modules del contenedor



volumes:
  mysql_data:
